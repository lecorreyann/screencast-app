<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenCast - Regarder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px 20px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
    }

    .status {
      font-size: 14px;
      color: #a0a0a0;
    }

    .status.live {
      color: #00b894;
    }

    .status.live::before {
      content: '● ';
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    video {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .overlay.hidden {
      display: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top-color: #00cec9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      font-size: 18px;
      color: #a0a0a0;
    }

    .error {
      color: #e74c3c;
    }

    .paused-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 30px 50px;
      border-radius: 12px;
    }

    .paused-overlay.hidden {
      display: none;
    }

    .paused-text {
      font-size: 20px;
      color: #fdcb6e;
    }

    .fullscreen-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .fullscreen-btn:hover {
      opacity: 1;
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🖥️ ScreenCast</div>
    <div id="status" class="status">Connexion...</div>
  </div>

  <div class="video-container">
    <video id="video" autoplay playsinline></video>

    <div id="loading-overlay" class="overlay">
      <div class="spinner"></div>
      <div class="message">Connexion au stream...</div>
    </div>

    <div id="paused-overlay" class="paused-overlay hidden">
      <div class="paused-text">⏸ Stream en pause</div>
    </div>

    <div id="error-overlay" class="overlay hidden">
      <div class="message error" id="error-message">Erreur</div>
    </div>
  </div>

  <button id="fullscreen-btn" class="fullscreen-btn">⛶ Plein écran</button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Récupérer l'ID de session
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('s');

    if (!sessionId) {
      showError('Lien invalide');
    }

    // Éléments DOM
    const video = document.getElementById('video');
    const loadingOverlay = document.getElementById('loading-overlay');
    const pausedOverlay = document.getElementById('paused-overlay');
    const errorOverlay = document.getElementById('error-overlay');
    const errorMessage = document.getElementById('error-message');
    const statusEl = document.getElementById('status');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    // WebRTC
    let peerConnection = null;
    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    // Connexion
    const socket = io();

    socket.on('connect', () => {
      socket.emit('join-session', sessionId, (response) => {
        if (response.error) {
          showError(response.error);
        }
      });
    });

    socket.on('connect_error', () => {
      showError('Impossible de se connecter au serveur');
    });

    // Recevoir l'offre WebRTC
    socket.on('offer', async (broadcasterId, offer) => {
      peerConnection = new RTCPeerConnection(rtcConfig);

      peerConnection.ontrack = (event) => {
        video.srcObject = event.streams[0];
        loadingOverlay.classList.add('hidden');
        statusEl.innerHTML = '<span class="live">En direct</span>';
        statusEl.className = 'status live';
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', broadcasterId, event.candidate);
        }
      };

      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      socket.emit('answer', broadcasterId, answer);
    });

    socket.on('ice-candidate', (senderId, candidate) => {
      if (peerConnection) {
        peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      }
    });

    socket.on('stream-paused', () => {
      pausedOverlay.classList.remove('hidden');
      statusEl.textContent = 'En pause';
      statusEl.className = 'status';
    });

    socket.on('stream-resumed', () => {
      pausedOverlay.classList.add('hidden');
      statusEl.className = 'status live';
    });

    socket.on('stream-ended', () => {
      showError('Le stream est terminé');
      if (peerConnection) {
        peerConnection.close();
      }
    });

    function showError(msg) {
      loadingOverlay.classList.add('hidden');
      errorOverlay.classList.remove('hidden');
      errorMessage.textContent = msg;
      statusEl.textContent = 'Déconnecté';
      statusEl.className = 'status';
    }

    // Plein écran
    fullscreenBtn.addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.body.requestFullscreen();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        fullscreenBtn.click();
      }
    });
  </script>
</body>
</html>
