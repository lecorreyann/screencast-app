<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ScreenCast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      padding: 20px;
      -webkit-app-region: drag;
    }

    .container {
      -webkit-app-region: no-drag;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    h1::before {
      content: '🖥️ ';
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #a0a0a0;
      font-size: 14px;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    select option {
      background: #1a1a2e;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
      color: #fff;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
    }

    .btn-pause {
      background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%);
      color: #1a1a2e;
    }

    .btn-stop {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: #fff;
      margin-top: 10px;
    }

    .link-box {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: none;
    }

    .link-box.active {
      display: block;
    }

    .link-label {
      font-size: 12px;
      color: #a0a0a0;
      margin-bottom: 8px;
    }

    .link-row {
      display: flex;
      gap: 10px;
    }

    .link-input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: rgba(0,0,0,0.3);
      color: #00cec9;
      font-family: monospace;
      font-size: 14px;
    }

    .btn-copy {
      padding: 10px 15px;
      background: #6c5ce7;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-copy:hover {
      background: #5b4cdb;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #a0a0a0;
    }

    .status.live {
      color: #00b894;
    }

    .status.live::before {
      content: '● ';
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .viewers {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ScreenCast</h1>

    <div class="form-group">
      <label>Partager</label>
      <select id="source-select">
        <option value="">Chargement...</option>
      </select>
    </div>

    <button id="start-btn" class="btn btn-start">▶ Démarrer</button>
    <button id="pause-btn" class="btn btn-pause" style="display:none;">⏸ Pause</button>
    <button id="stop-btn" class="btn btn-stop" style="display:none;">⏹ Arrêter</button>

    <div id="link-box" class="link-box">
      <div class="link-label">🔗 Lien de partage</div>
      <div class="link-row">
        <input type="text" id="link-input" class="link-input" readonly>
        <button id="copy-btn" class="btn-copy">Copier</button>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="viewers" class="viewers"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
